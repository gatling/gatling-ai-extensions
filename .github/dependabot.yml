version: 2
updates:
  - package-ecosystem: "github-actions"
    target-branch: "dev"
    commit-message:
      prefix: "chore"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday" # explicit, even though it's the weekly default
      time: "07:00" # UTC
  - package-ecosystem: "npm"
    target-branch: "dev"
    commit-message:
      prefix: "chore"
    directories:
      - "/mcp-servers/gatling"
    schedule:
      interval: "weekly"
      day: "monday" # explicit, even tough it's the weekly default
      time: "07:00" # UTC
    ignore:
      - dependency-name: "@types/node"
        update-types: [ "version-update:semver-major" ] # Keep to a specified (LTS) major version
