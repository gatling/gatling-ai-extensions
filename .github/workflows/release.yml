name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "version number (e.g. '1.2.3')"

permissions:
  id-token: write
  contents: write

defaults:
  run:
    shell: bash

env:
  VERSION: ${{ inputs.version }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version number
        run: |
          echo "${VERSION}" | grep -P '^[0-9]+\.[0-9]+\.[0-9]+$'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Build and publish to npmjs

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Npm build
        working-directory: ./mcp-servers/gatling
        run: |
          npm version "$VERSION"
          npm ci
          npm run format-check
          npm run build
          npm publish --access=public

      # Build and publish Docker image

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ./mcp-servers/gatling
          push: true
          sbom: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          tags: |
            gatlingcorp/gatling-mcp-server:${{ env.VERSION }}
            gatlingcorp/gatling-mcp-server:latest

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: gatlingcorp/gatling-mcp-server
          short-description: MCP server to bridge AI applications with Gatling Enterprise
          readme-filepath: ./mcp-servers/gatling/README.md

      - name: Install release deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GATLING_MCP_SERVER_RELEASE_DEPLOY_KEY }}" > ~/.ssh/id_release_deploy_key
          chmod 600 ~/.ssh/id_release_deploy_key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      # Update marketplace files and tag

      - name: Edit marketplace plugin version
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/id_release_deploy_key -o IdentitiesOnly=yes"
          GIT_USER_NAME: ${{ secrets.GATLING_CI_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GATLING_CI_EMAIL }}
        run: |
          contents=$(jq ".version = \"$VERSION\"" plugins/gatling/.claude-plugin/plugin.json) && \
          echo -E "$contents" > plugins/gatling/.claude-plugin/plugin.json
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git commit --all --message "chore: set plugin version to $VERSION"
          git tag "v$VERSION" --message "Version v$VERSION"
          git push origin
          git push origin "v$VERSION"
