name: Build gatling-mcp-server

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'mcp-servers/gatling/**'
      - '.github/workflows/gatling-mcp-server-build.yml'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gatling-mcp-server: ${{ steps.filter.outputs.gatling-mcp-server }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gatling-mcp-server:
              - 'mcp-servers/gatling/**'
              - '.github/workflows/gatling-mcp-server-build.yml'

  build:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.gatling-mcp-server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update npm
        run: npm install -g npm@latest

      - name: Npm build
        working-directory: ./mcp-servers/gatling
        run: |
          npm ci
          npm run format-check
          npm run build

      - name: Docker build
        working-directory: ./mcp-servers/gatling
        run: |
          docker build .
