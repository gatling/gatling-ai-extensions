gatling.enterprise.package {
  # Consistent deployment using an existing package ID
  # id = "package_00000000000000000000000000"
  # Set after first deployment for consistent updates (prevents duplicates on rename)
  name = "<package-name>"
  # Prefer using the team name instead of its ID
  team = "<team-name>"

  # Shared defaults, simulation-specific values override these
  default {
    simulation {
      locations = [
        { name: "<location>", size: <load-generators>, weight: <percentage> }
      ]
      parameters {
        ignoreDefaults = false
        systemProperties {
          "property.name" = "value"
        }
        environmentVariables {
          ENV_VAR = "value"
        }
      }
      timeWindow {
        rampUp = 0   # seconds to ignore at start
        rampDown = 0 # seconds to ignore at end
      }
      stopCriteria = []
    }
  }

  simulations = [
    {
      name = "<display-name>"
      # Consistent deployment using an existing simulation ID
      # id = "test_00000000000000000000000000"
      simulation = "<fully.qualified.ClassName>" # only mandatory field
    }
  ]
}
